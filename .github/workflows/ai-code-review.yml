name: AI Code Review
on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      DEVKIT_READ_TOKEN:
        required: false

jobs:
  spec-conformance:
    name: Spec Conformance Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    if: contains(github.event.pull_request.body, 'Spec:')
    steps:
      - uses: actions/checkout@v4

      - name: Extract spec reference from PR body
        id: spec-ref
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          SPEC_REF=$(echo "$PR_BODY" | grep -oP 'Spec:\s*\K\S+' || echo "")
          if [ -n "$SPEC_REF" ] && ! [[ "$SPEC_REF" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Invalid spec reference format: '$SPEC_REF'"
            exit 1
          fi
          echo "spec_ref=$SPEC_REF" >> "$GITHUB_OUTPUT"
          if [ -z "$SPEC_REF" ]; then
            echo "No spec reference found in PR body. Skipping conformance check."
            exit 0
          fi

      - name: Check DEVKIT_READ_TOKEN availability
        id: check-token
        if: steps.spec-ref.outputs.spec_ref != ''
        env:
          HAS_TOKEN: ${{ secrets.DEVKIT_READ_TOKEN != '' }}
        run: |
          if [ "$HAS_TOKEN" = "true" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::DEVKIT_READ_TOKEN not provided — skipping HLTC fetch and spec conformance review."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch HLTC from devkit
        if: steps.spec-ref.outputs.spec_ref != '' && steps.check-token.outputs.available == 'true'
        run: |
          gh api "repos/truckbay/truckbays-devkit/contents/openspec/changes/${{ steps.spec-ref.outputs.spec_ref }}/hltc.md" \
            --jq '.content' | base64 -d > /tmp/hltc.md
        env:
          GH_TOKEN: ${{ secrets.DEVKIT_READ_TOKEN }}

      - name: Claude Code spec conformance review
        if: steps.spec-ref.outputs.spec_ref != '' && steps.check-token.outputs.available == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are a spec-conformance reviewer. Review this PR against the
            High-Level Technical Contract at /tmp/hltc.md.

            Check:
            1. All requirements from the HLTC are implemented
            2. No behavior beyond the approved contract was introduced
            3. Error handling matches the spec
            4. Input/output shapes match the spec
            5. Architectural placement matches the spec

            Report ONLY discrepancies. Do NOT evaluate code style or quality
            (CodeRabbit handles that). If everything conforms, say "Spec conformance: PASS".
