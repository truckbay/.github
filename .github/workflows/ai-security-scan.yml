name: AI Security Scan
on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  security-review:
    name: Security Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Claude Code security review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR for security vulnerabilities in an Express 4 +
            Sequelize 6 (PostgreSQL) API with Stripe payment integration.

            Focus on:
            1. SQL injection — especially raw Sequelize queries (sequelize.query,
               Sequelize.literal) and dynamic column/table references
            2. Authentication/authorization bypasses — missing auth middleware
               on routers, broken role checks, JWT validation gaps,
               express-session misconfiguration
            3. Sensitive data exposure — API keys, tokens, PII in logs, Stripe
               secrets in responses
            4. Input validation gaps — missing express-validator chains on
               routes, unvalidated path/query params, unsafe type coercion,
               express-fileupload misuse (size/type limits, path traversal)
            5. IDOR — direct database lookups by user-supplied ID without
               ownership verification (check that queries filter by the
               authenticated user's tenant/fleet/warehouse scope)
            6. Stripe webhook security — missing signature verification,
               trusting unverified webhook payloads
            7. Mass assignment — Sequelize create/update calls passing
               unsanitized req.body directly without an allowlist of fields

            Report only real, exploitable issues with concrete proof from the
            diff. Do not flag theoretical concerns or style preferences. For
            each issue provide: file, line, vulnerability type, severity
            (critical/high/medium), and a suggested fix.
